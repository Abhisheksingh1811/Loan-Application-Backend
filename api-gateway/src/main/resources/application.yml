server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: loanaxis-api-route
              uri: ${SECURELOAN_API_BASE_URL:http://localhost:8081}
              predicates:
                - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
